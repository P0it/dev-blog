name: Supabase Keep-Alive

# 무료 Supabase 프로젝트는 7일간 활동이 없으면 자동 정지된다.
# GitHub 클라우드에서 3일마다 가벼운 요청을 한 번 보내 활동을 유지한다.
# (내 PC/개발 서버가 꺼져 있어도 GitHub이 대신 실행한다.)

on:
  schedule:
    # 3일마다 00:00 UTC 실행 (7일 정지 한도보다 넉넉하게)
    - cron: "0 0 */3 * *"
  workflow_dispatch: # 수동 실행 버튼도 제공

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "::error::SUPABASE_URL 또는 SUPABASE_ANON_KEY 시크릿이 설정되지 않았습니다."
            exit 1
          fi

          # posts 테이블에서 1행만 요청 — 부하 거의 없음. 활동 갱신이 목적.
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/posts?select=slug&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")

          echo "HTTP status: $status"
          if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
            echo "✅ Supabase 응답 정상 — 프로젝트가 깨어 있습니다."
          else
            echo "::error::Supabase가 예상치 못한 상태를 반환했습니다 ($status). 프로젝트가 정지/삭제됐거나 키가 잘못됐을 수 있습니다."
            exit 1
          fi
