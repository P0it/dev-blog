        - paragraph [ref=e49]:
          - text: 루프는
          - strong [ref=e50]: 작업 안쪽
          - text: 의 반복, 루틴은
          - strong [ref=e51]: 작업 바깥쪽
          - text: 의 반복입니다. 둘은 층이 다릅니다.
        - paragraph [ref=e54]: 안쪽 네모(루프)는 한 번의 작업을 완성하는 고리이고, 바깥 네모(루틴)는 그 작업을 매일 다시 깨우는 시계입니다.
        - heading "루틴은 어떻게 도는가" [level=2] [ref=e55]
        - paragraph [ref=e56]:
          - text: 루틴의 핵심은
          - strong [ref=e57]: 트리거(언제 시작?)
          - text: 와
          - strong [ref=e58]: 멱등성(여러 번 돌아도 안전한가?)
          - text: 입니다.
        - paragraph [ref=e61]:
          - code [ref=e62]: G
          - text: 단계가 없으면, 트리거가 두 번 울렸을 때 같은 일을 두 번 합니다(메일 두 번 발송 같은 사고). 그래서 "이미 했는지 확인 → 안 했으면 실행 → 했다고 기록"이 루틴 설계의 기본 골격입니다.
        - heading "실제 응용 사례" [level=2] [ref=e63]
        - heading "사례 1 — 매일 아침 뉴스 브리핑" [level=3] [ref=e64]
        - paragraph [ref=e65]: 매일 06:00에 루틴이 깨어나 → 뉴스 소스를 모으고 → 내부 루프로 섹션별 요약을 만들고 → 메신저로 한 통 보냅니다. 사람은 아무것도 안 하지만 매일 정해진 시간에 결과가 옵니다. "한 번 시키는 것"과 "매일 알아서"의 차이가 여기서 드러납니다.
        - heading "사례 2 — PR 자동 점검" [level=3] [ref=e66]
        - paragraph [ref=e67]:
          - text: 새 PR이 올라오는
          - strong [ref=e68]: 이벤트
          - text: 가 트리거입니다. 루틴이 깨어나 변경된 코드를 읽고(내부 루프), 위험한 패턴이 있으면 코멘트를 답니다. 시간 기반이 아니라 사건 기반 루틴의 예입니다.
        - heading "사례 3 — 장기 작업의 자기 호출" [level=3] [ref=e69]
        - paragraph [ref=e70]: 큰 작업을 한 번에 못 끝낼 때, 루틴이 "다음에 이어서 할 일"을 메모로 남기고 스스로를 일정에 다시 등록합니다. 다음 실행 때 메모를 읽고 이어서 진행합니다. 사람이 중간에 챙기지 않아도 됩니다.
        - heading "설계할 때 빠지기 쉬운 함정" [level=2] [ref=e71]
        - paragraph [ref=e74]:
          - text: 특히
          - code [ref=e75]: C
          - text: (무한 루프)와
          - code [ref=e76]: D
          - text: (조용한 실패)가 위험합니다. 루프에는 반드시 "최대 횟수"나 "타임아웃" 같은 탈출구를 두고, 실패하면 사람에게 알리도록 만들어야 합니다.
        - heading "한 줄 정리" [level=2] [ref=e77]
        - paragraph [ref=e78]:
          - strong [ref=e79]: 루프는 작업을 끝내는 안쪽 고리, 루틴은 작업을 다시 깨우는 바깥 시계.
          - text: 좋은 루틴은 "이미 했는지 확인 → 실행 → 기록 → 알림"의 네 박자를 지키고, 루프에는 항상 탈출구를 둡니다.
